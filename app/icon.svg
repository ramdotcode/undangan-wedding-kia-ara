<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Latar lingkaran navy (konsisten dengan tema Elevra) -->
  <circle cx="32" cy="32" r="32" fill="#1e2a4a"/>
  <!-- Ring gold tipis -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#c9a96e" stroke-width="1"/>
  <!-- Mahkota bunga mawar (gold) -->
  <g transform="translate(32 32)">
    <!-- 5 petal mengelilingi pusat -->
    <g fill="#c9a96e">
      <ellipse cx="0" cy="-9" rx="5" ry="7"/>
      <ellipse cx="8.5" cy="-2.8" rx="5" ry="7" transform="rotate(72 8.5 -2.8)"/>
      <ellipse cx="5.3" cy="7.3" rx="5" ry="7" transform="rotate(144 5.3 7.3)"/>
      <ellipse cx="-5.3" cy="7.3" rx="5" ry="7" transform="rotate(216 -5.3 7.3)"/>
      <ellipse cx="-8.5" cy="-2.8" rx="5" ry="7" transform="rotate(288 -8.5 -2.8)"/>
    </g>
    <!-- 2 daun kecil di sisi bawah -->
    <g fill="#a8843f">
      <ellipse cx="-9" cy="6" rx="3" ry="1.5" transform="rotate(30 -9 6)"/>
      <ellipse cx="9" cy="6" rx="3" ry="1.5" transform="rotate(-30 9 6)"/>
    </g>
    <!-- Pusat mawar (lebih gelap) -->
    <circle cx="0" cy="0" r="3" fill="#a8843f"/>
  </g>
</svg>
